<div class="divider"></div>

          <div class="settingsGroup">
            <div class="settingsRow">
              <div>
                <div class="settingsLabel">Импорт CSV</div>
                <div class="settingsHint">courseName,type,dayOfWeek,startTime,endTime,weekType,location,color</div>
              </div>
              <label class="btn btn--secondary fileBtn">
                Выбрать файл
                <input id="csvInput" type="file" accept=".csv,text/csv" />
              </label>
            </div>

            <div class="settingsRow settingsRow--stack">
              <button class="btn btn--secondary" id="exportJsonBtn" type="button">Экспорт данных</button>
              <button class="btn btn--danger" id="resetAllBtn" type="button">Сбросить всё</button>
            </div>
          </div>
        </div>

        <div class="card fadeIn">
          <div class="cardHeader">
            <div class="cardTitle">Достижения</div>
            <div class="cardHint">маленькие победы ✨</div>
          </div>
          <div id="achievementsRoot"></div>
        </div>

        <div class="card fadeIn">
          <div class="cardHeader">
            <div class="cardTitle">Цвета предметов</div>
            <div class="cardHint">настрой под себя</div>
          </div>
          <div class="subjectColors" id="subjectColors"></div>
        </div>
      </section>
    </main>

    <nav class="bottomTabs" aria-label="Навигация">
      <button class="tab tab--active" id="tabSchedule" type="button">
        <span class="tab__emoji">📅</span>
        <span class="tab__label">Расписание</span>
      </button>

      <button class="tab" id="tabWishes" type="button">
        <span class="tab__emoji">💗</span>
        <span class="tab__label">Пожелания</span>
      </button>

      <button class="tab" id="tabNotes" type="button">
        <span class="tab__emoji">📝</span>
        <span class="tab__label">Заметки</span>
      </button>

      <button class="tab" id="tabSettings" type="button">
        <span class="tab__emoji">⚙️</span>
        <span class="tab__label">Настройки</span>
      </button>
    </nav>

    <dialog class="modal" id="calendarModal">
      <div class="modal__body">
        <div class="modal__head">
          <div class="modal__title">Календарь</div>
          <button class="iconBtn" id="calendarCloseBtn" type="button" aria-label="Закрыть">✕</button>
        </div>
        <div class="calendarRoot" id="calendarRoot"></div>
      </div>
    </dialog>

    <div class="overlay hidden" id="praiseOverlay" aria-live="polite" aria-modal="true" role="dialog">
      <div class="overlay__card">
        <div class="overlay__confetti" id="praiseConfetti" aria-hidden="true"></div>
        <div class="overlay__title" id="praiseTitle">Умничка 💗</div>
        <div class="overlay__text" id="praiseText">—</div>
        <button class="btn overlay__btn" id="praiseCloseBtn" type="button">Продолжить</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
